<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeMove</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0F;--bg2:#111118;--bg3:#16161F;
  --card:#1A1A24;--card2:#1F1F2C;--card3:#242433;
  --text:#F0F0F5;--text2:#9090A8;--text3:#5A5A72;
  --border:#2A2A3C;--border2:#333348;
  --blue:#3B82F6;--blue2:#60A5FA;--blue-bg:rgba(59,130,246,0.12);--blue-border:rgba(59,130,246,0.25);W
  --pink:#EC4899;--pink2:#F472B6;--pink-bg:rgba(236,72,153,0.12);--pink-border:rgba(236,72,153,0.25);
  --purple:#8B5CF6;--purple-bg:rgba(139,92,246,0.12);
  --green:#10B981;--green-bg:rgba(16,185,129,0.1);
  --amber:#F59E0B;--amber-bg:rgba(245,158,11,0.1);
  --red:#EF4444;--red-bg:rgba(239,68,68,0.1);
  --radius:14px;--radius-sm:8px;--radius-xs:6px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}

/* NAV */
nav{background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:58px;gap:16px}
.nav-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--pink));display:flex;align-items:center;justify-content:center}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;background:linear-gradient(90deg,var(--blue2),var(--pink2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-sub{font-size:11px;color:var(--text3);font-weight:400;-webkit-text-fill-color:var(--text3)}
.nav-tabs{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px}
.nav-tab{padding:6px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .2s;font-family:'Inter',sans-serif}
.nav-tab.active{background:var(--card3);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.nav-tab:hover:not(.active){color:var(--text)}
.sync-badge{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--green-bg);color:var(--green);font-weight:500;border:1px solid rgba(16,185,129,0.2);white-space:nowrap;flex-shrink:0}

main{max-width:1100px;margin:0 auto;padding:28px 24px}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:22px}

/* METRIC CARDS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px}
.metric-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.metric-value{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--text);line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:5px}
.metric.blue{border-color:var(--blue-border);background:var(--blue-bg)}
.metric.blue .metric-value{color:var(--blue2)}
.metric.pink{border-color:var(--pink-border);background:var(--pink-bg)}
.metric.pink .metric-value{color:var(--pink2)}
.metric.green{border-color:rgba(16,185,129,0.2);background:var(--green-bg)}
.metric.green .metric-value{color:var(--green)}
.metric.amber{border-color:rgba(245,158,11,0.2);background:var(--amber-bg)}
.metric.amber .metric-value{color:var(--amber)}

/* PROGRESS */
.prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:6px 0}
.prog-fill{height:100%;border-radius:3px;transition:width .6s ease;background:linear-gradient(90deg,var(--blue),var(--pink))}
.prog-fill.green{background:var(--green)}
.prog-fill.amber{background:var(--amber)}
.prog-fill.red{background:var(--red)}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.3px}
.tag-essencial{background:var(--blue-bg);color:var(--blue2);border:1px solid var(--blue-border)}
.tag-nao{background:var(--purple-bg);color:#A78BFA;border:1px solid rgba(139,92,246,.25)}
.tag-alta{background:var(--red-bg);color:#FCA5A5;border:1px solid rgba(239,68,68,.2)}
.tag-media{background:var(--amber-bg);color:#FCD34D;border:1px solid rgba(245,158,11,.2)}
.tag-baixa{background:var(--green-bg);color:#6EE7B7;border:1px solid rgba(16,185,129,.2)}

/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);font-family:'Inter',sans-serif;transition:all .15s}
.filter-btn.active{background:var(--card3);color:var(--text);border-color:var(--border2)}
.filter-btn:hover:not(.active){border-color:var(--text3);color:var(--text)}
.search-input{flex:1;min-width:180px;padding:7px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;font-family:'Inter',sans-serif;background:var(--card);color:var(--text);outline:none;transition:border .15s}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}

/* ITEM LIST */
.item-list{display:flex;flex-direction:column;gap:5px}
.item-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:grid;grid-template-columns:28px 1fr auto;gap:12px;align-items:center;transition:all .15s}
.item-row:hover{border-color:var(--border2);background:var(--card2)}
.item-row.comprado{opacity:.5;background:var(--bg2)}
.item-row.comprado .item-name{text-decoration:line-through;color:var(--text3)}
.item-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;background:transparent}
.item-check:hover{border-color:var(--blue)}
.item-check.checked{background:linear-gradient(135deg,var(--blue),var(--purple));border-color:transparent}
.item-check svg{display:none}
.item-check.checked svg{display:block}
.item-info{min-width:0}
.item-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{display:flex;gap:6px;align-items:center;margin-top:4px;flex-wrap:wrap}
.item-amb{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:4px;border:1px solid var(--border)}
.item-obs{font-size:11px;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:420px}
.item-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.item-price{text-align:right;white-space:nowrap}
.item-price strong{display:block;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--text)}
.item-price-sub{font-size:11px;color:var(--text3)}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-success{background:var(--blue-bg);color:var(--blue2);border:1px solid var(--blue-border)}
.btn-success:hover{background:var(--blue);color:#fff}
.btn-danger{background:var(--red-bg);color:#FCA5A5;border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--card2);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;margin-bottom:22px;color:var(--text)}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 13px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;font-family:'Inter',sans-serif;background:var(--bg3);color:var(--text);outline:none;transition:border .15s;-webkit-appearance:none}
.form-input::placeholder{color:var(--text3)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.form-select option{background:var(--card)}
.form-textarea{resize:vertical;min-height:72px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.compra-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:20px}
.compra-box p{font-size:12px;color:var(--text3);margin-bottom:3px}
.compra-box strong{font-size:15px;font-weight:600;color:var(--text)}
.compra-box .est{font-size:12px;color:var(--blue2);margin-top:6px}

/* RESUMO CARDS */
.amb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:14px}
.amb-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .15s}
.amb-card:hover{border-color:var(--border2)}
.amb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.amb-dot{width:9px;height:9px;border-radius:50%;margin-right:8px;display:inline-block;flex-shrink:0}
.amb-name{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--text)}
.amb-count{font-size:12px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:4px;border:1px solid var(--border)}
.amb-items{display:flex;flex-direction:column;gap:5px;margin:10px 0}
.amb-item-row{display:flex;align-items:center;gap:8px;font-size:12px}
.amb-values{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.amb-val-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.amb-val-num{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--text)}

/* DASH */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-label{font-size:12px;color:var(--text2);width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:14px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:3px;transition:width .7s ease}
.bar-val{font-size:11px;color:var(--text3);min-width:65px;text-align:right;font-variant-numeric:tabular-nums}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.fin-label{font-size:13px;color:var(--text2)}
.fin-val{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600}
.purchase-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}

/* EMPTY */
.empty{text-align:center;padding:52px 20px;color:var(--text3)}
.empty h3{font-family:'Space Grotesk',sans-serif;font-size:18px;margin-bottom:8px;color:var(--text2);font-weight:500}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card3);border:1px solid var(--border2);color:var(--text);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;animation:toastIn .25s ease;box-shadow:0 8px 32px rgba(0,0,0,.5)}
@keyframes toastIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* CONFIRM */
.confirm-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;width:100%;max-width:360px}
.confirm-box h3{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;margin-bottom:10px}
.confirm-box p{font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.6}

/* DIVIDERS */
.section-sep{height:1px;background:var(--border);margin:32px 0}

@media(max-width:640px){
  nav{padding:0 14px;height:52px}
  .nav-sub{display:none}
  .nav-tabs{gap:1px}
  .nav-tab{padding:5px 10px;font-size:12px}
  main{padding:16px 14px}
  .item-row{grid-template-columns:26px 1fr auto}
  .form-row{grid-template-columns:1fr}
  .metrics{grid-template-columns:1fr 1fr}
  .dash-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-logo">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M4 14L9 4L14 14M6 11H12" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="nav-title">WeMove</div>
      <div class="nav-sub" style="font-family:'Inter',sans-serif;font-size:11px;-webkit-text-fill-color:var(--text3)">Família Novais</div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="setTab('lista')">Lista</button>
    <button class="nav-tab" onclick="setTab('resumo')">Ambientes</button>
    <button class="nav-tab" onclick="setTab('dash')">Dashboard</button>
  </div>
  <span class="sync-badge" id="sync-badge">● ao vivo</span>
</nav>

<main>
  <!-- LISTA -->
  <div id="tab-lista">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:12px">
      <div>
        <h2 class="section-title">Lista de compras</h2>
        <p class="section-sub" id="lista-sub">Carregando...</p>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1V12M1 6.5H12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Adicionar item
      </button>
    </div>
    <div class="metrics" id="metrics-lista"></div>
    <div class="filters">
      <input class="search-input" id="search" placeholder="Buscar item ou ambiente..." oninput="renderLista()">
      <button class="filter-btn active" onclick="setFilter(this,'todos')">Todos</button>
      <button class="filter-btn" onclick="setFilter(this,'Essencial')">Essencial</button>
      <button class="filter-btn" onclick="setFilter(this,'Não Essencial')">Não essencial</button>
      <button class="filter-btn" onclick="setFilter(this,'Alta')">Alta prioridade</button>
      <button class="filter-btn" onclick="setFilter(this,'pendente')">Pendentes</button>
      <button class="filter-btn" onclick="setFilter(this,'comprado')">Comprados</button>
    </div>
    <div id="lista-items" class="item-list"></div>
  </div>

  <!-- RESUMO -->
  <div id="tab-resumo" style="display:none">
    <h2 class="section-title">Por ambiente</h2>
    <p class="section-sub">Progresso e custos por cômodo</p>
    <div id="amb-cards" class="amb-grid"></div>
    <div class="section-sep"></div>
    <h2 class="section-title">Por prioridade</h2>
    <p class="section-sub">Itens agrupados por urgência de compra</p>
    <div id="pri-cards" class="amb-grid"></div>
  </div>

  <!-- DASH -->
  <div id="tab-dash" style="display:none">
    <h2 class="section-title">Dashboard</h2>
    <p class="section-sub">Visão geral do planejamento da mudança</p>
    <div id="dash-content"></div>
  </div>
</main>

<!-- MODAL ADICIONAR -->
<div id="modal-add" class="modal-overlay" style="display:none" onclick="overlayClick(event,'modal-add')">
  <div class="modal">
    <h2>Novo item</h2>
    <div class="form-group">
      <label class="form-label">Nome do item *</label>
      <input class="form-input" id="add-nome" placeholder="ex: Sofá 3 lugares">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Ambiente *</label>
        <select class="form-select" id="add-amb">
          <option>Sala</option><option>Cozinha</option><option>Quarto Casal</option>
          <option>Escritório</option><option>Área de Serviço</option>
          <option>Banheiro / Lavabo</option><option>Geral / Tecnologia</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Categoria *</label>
        <select class="form-select" id="add-cat">
          <option>Essencial</option><option>Não Essencial</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prioridade *</label>
        <select class="form-select" id="add-pri">
          <option>Alta</option><option>Média</option><option>Baixa</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Quantidade</label>
        <input class="form-input" id="add-qtd" type="number" min="1" value="1">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Preço mínimo (R$)</label>
        <input class="form-input" id="add-min" type="number" min="0" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Preço máximo (R$)</label>
        <input class="form-input" id="add-max" type="number" min="0" placeholder="0">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Observação</label>
      <textarea class="form-textarea" id="add-obs" placeholder="Dicas de tamanho, marca, modelo..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
      <button class="btn btn-primary" onclick="addItem()">Adicionar item</button>
    </div>
  </div>
</div>

<!-- MODAL COMPRA -->
<div id="modal-compra" class="modal-overlay" style="display:none" onclick="overlayClick(event,'modal-compra')">
  <div class="modal">
    <h2>Registrar compra</h2>
    <div class="compra-box" id="compra-info"></div>
    <div class="form-group">
      <label class="form-label">Valor total pago (R$) *</label>
      <input class="form-input" id="compra-valor" type="number" min="0" step="0.01" placeholder="0,00">
    </div>
    <div class="form-group">
      <label class="form-label">Onde comprou</label>
      <input class="form-input" id="compra-loja" placeholder="ex: Magazine Luiza, Tok&Stok...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarCompra()">Confirmar compra</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRM -->
<div id="modal-confirm" class="modal-overlay" style="display:none">
  <div class="confirm-box">
    <h3 id="confirm-title">Confirmar remoção</h3>
    <p id="confirm-msg"></p>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
      <button class="btn btn-danger" id="confirm-ok">Remover</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY='wemove_novais_v1';
const INITIAL_DATA=[

let itens=[],filtroAtivo='todos',tabAtiva='lista',compraItemId=null,nextId=200,toastTimer;

const AMB_COLORS={'Sala':'#3B82F6','Cozinha':'#F59E0B','Quarto Casal':'#EC4899','Escritório':'#8B5CF6','Área de Serviço':'#10B981','Banheiro / Lavabo':'#06B6D4','Geral / Tecnologia':'#6B7280'};

function fmt(n){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);}

function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){const p=JSON.parse(raw);itens=p.itens||INITIAL_DATA;nextId=p.nextId||(Math.max(...itens.map(i=>i.id))+1);}
    else{itens=JSON.parse(JSON.stringify(INITIAL_DATA));saveData();}
  }catch(e){itens=JSON.parse(JSON.stringify(INITIAL_DATA));}
  renderAll();
}

function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({itens,nextId}));
    const b=document.getElementById('sync-badge');
    b.textContent='✓ salvo';b.style.background='rgba(16,185,129,0.15)';
    setTimeout(()=>{b.textContent='● ao vivo';},1500);
  }catch(e){}
}

function setTab(t){
  tabAtiva=t;
  ['lista','resumo','dash'].forEach(id=>document.getElementById('tab-'+id).style.display=(id===t)?'block':'none');
  document.querySelectorAll('.nav-tab').forEach((btn,i)=>btn.classList.toggle('active',['lista','resumo','dash'][i]===t));
  renderAll();
}

function setFilter(el,f){
  filtroAtivo=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');renderLista();
}

function getFiltered(){
  const q=(document.getElementById('search')?.value||'').toLowerCase().trim();
  return itens.filter(i=>{
    const ms=!q||i.nome.toLowerCase().includes(q)||i.amb.toLowerCase().includes(q)||(i.obs||'').toLowerCase().includes(q);
    const mf=filtroAtivo==='todos'||(filtroAtivo==='Essencial'&&i.cat==='Essencial')||(filtroAtivo==='Não Essencial'&&i.cat==='Não Essencial')||(filtroAtivo==='Alta'&&i.pri==='Alta')||(filtroAtivo==='pendente'&&!i.comprado)||(filtroAtivo==='comprado'&&i.comprado);
    return ms&&mf;
  });
}

function renderMetricsLista(){
  const total=itens.length,comp=itens.filter(i=>i.comprado).length;
  const tMin=itens.reduce((s,i)=>s+i.min*i.qtd,0),tMax=itens.reduce((s,i)=>s+i.max*i.qtd,0);
  const gasto=itens.filter(i=>i.comprado).reduce((s,i)=>s+(i.gasto||0),0);
  const pct=total?Math.round(comp/total*100):0;
  document.getElementById('metrics-lista').innerHTML=`
    <div class="metric"><div class="metric-label">Total de itens</div><div class="metric-value">${total}</div><div class="metric-sub">${itens.filter(i=>i.cat==='Essencial').length} essenciais</div></div>
    <div class="metric green"><div class="metric-label">Progresso</div><div class="metric-value">${pct}%</div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>
    <div class="metric amber"><div class="metric-label">Orçamento estimado</div><div class="metric-value">${fmt(tMin)}</div><div class="metric-sub">até ${fmt(tMax)}</div></div>
    <div class="metric blue"><div class="metric-label">Já gasto</div><div class="metric-value">${fmt(gasto)}</div><div class="metric-sub">${fmt(Math.max(0,tMin-gasto))} restante</div></div>`;
  document.getElementById('lista-sub').textContent=`${total-comp} item${total-comp!==1?'s':''} pendente${total-comp!==1?'s':''}`;
}

function renderLista(){
  renderMetricsLista();
  const filtered=getFiltered();
  const container=document.getElementById('lista-items');
  if(!filtered.length){container.innerHTML='<div class="empty"><h3>Nenhum item encontrado</h3><p>Tente outro filtro ou busca</p></div>';return;}
  container.innerHTML=filtered.map(i=>`
    <div class="item-row ${i.comprado?'comprado':''}" id="row-${i.id}">
      <div class="item-check ${i.comprado?'checked':''}" onclick="toggleCompra(${i.id})">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5L4.5 8.5L9.5 2.5" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="item-info">
        <div class="item-name">${i.nome}</div>
        <div class="item-meta">
          <span class="item-amb">${i.amb}</span>
          <span class="tag ${i.cat==='Essencial'?'tag-essencial':'tag-nao'}">${i.cat}</span>
          <span class="tag tag-${i.pri.toLowerCase()}">${i.pri}</span>
          ${i.comprado&&i.loja?`<span style="font-size:11px;color:var(--text3)">${i.loja}</span>`:''}
        </div>
        ${i.obs?`<div class="item-obs">${i.obs}</div>`:''}
      </div>
      <div class="item-actions">
        <div class="item-price">
          ${i.comprado&&i.gasto?`<strong style="color:var(--green)">${fmt(i.gasto)}</strong><div class="item-price-sub">pago</div>`:
          `<strong>${fmt(i.min*i.qtd)}</strong><div class="item-price-sub">até ${fmt(i.max*i.qtd)} · ${i.qtd}un</div>`}
        </div>
        ${!i.comprado?`<button class="btn btn-success btn-sm" onclick="openCompraModal(${i.id})">Comprei</button>`:''}
        <button class="btn btn-danger btn-sm" onclick="confirmRemove(${i.id})" title="Remover">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 1.5L9.5 9.5M9.5 1.5L1.5 9.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>`).join('');

function renderResumo(){
  const ambs=[...new Set(itens.map(i=>i.amb))];
  document.getElementById('amb-cards').innerHTML=ambs.map(amb=>{
    const its=itens.filter(i=>i.amb===amb),comp=its.filter(i=>i.comprado).length;
    const mn=its.reduce((s,i)=>s+i.min*i.qtd,0),mx=its.reduce((s,i)=>s+i.max*i.qtd,0);

    return`<div class="amb-card">
      <div class="amb-header">
        <div style="display:flex;align-items:center"><span class="amb-dot" style="background:${cor}"></span><span class="amb-name">${amb}</span></div>
        <span class="amb-count">${its.length} itens</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${cor}"></div></div>

      <div class="card">
        <div class="card-title">Orçamento por ambiente</div>
        ${ambs.map(amb=>{const v=itens.filter(i=>i.amb===amb).reduce((s,i)=>s+i.min*i.qtd,0);const w=maxV>0?Math.round(v/maxV*100):0;const cor=AMB_COLORS[amb]||'#6B7280';return`<div class="bar-row"><div class="bar-label">${amb.split('/')[0].trim()}</div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${cor}"></div></div><div class="bar-val">${fmt(v)}</div></div>`;}).join('')}
      </div>
      <div class="card">
        <div class="card-title">Resumo financeiro</div>
        ${[['Orçamento mínimo',fmt(tMin),'var(--text)'],['Orçamento máximo',fmt(tMax),'var(--text3)'],['Já gasto',fmt(gasto),'var(--green)'],['Restante (vs mínimo)',fmt(Math.max(0,tMin-gasto)),'var(--amber)'],['Progresso financeiro',Math.round(tMin>0?gasto/tMin*100:0)+'%','var(--blue2)']].map(([l,v,c])=>`<div class="fin-row"><span class="fin-label">${l}</span><span class="fin-val" style="color:${c}">${v}</span></div>`).join('')}
        <div class="card-title" style="margin-top:18px;margin-bottom:12px">Últimas compras</div>
        ${ultCompras.length?ultCompras.map(i=>`<div class="purchase-row"><div><div style="font-size:13px;font-weight:500;color:var(--text)">${i.nome}</div>${i.loja?`<div style="font-size:11px;color:var(--text3)">${i.loja}</div>`:''}</div><span style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--green)">${fmt(i.gasto)}</span></div>`).join(''):'<p style="font-size:13px;color:var(--text3);margin-top:6px">Nenhuma compra registrada ainda.</p>'}
      </div>
    </div>`;
}

function renderAll(){
  if(tabAtiva==='lista')renderLista();
  if(tabAtiva==='resumo')renderResumo();
  if(tabAtiva==='dash')renderDash();
}

function toggleCompra(id){
  const item=itens.find(i=>i.id===id);if(!item)return;
  if(!item.comprado){openCompraModal(id);}
  else{item.comprado=false;item.gasto=0;item.loja='';saveData();renderAll();showToast('Item desmarcado');}
}

function openCompraModal(id){
  compraItemId=id;const item=itens.find(i=>i.id===id);
  document.getElementById('compra-info').innerHTML=`<p>${item.amb}</p><strong>${item.nome}</strong><p class="est">Estimativa: ${fmt(item.min*item.qtd)} a ${fmt(item.max*item.qtd)} · ${item.qtd}un</p>`;
  document.getElementById('compra-valor').value='';document.getElementById('compra-loja').value='';
  document.getElementById('modal-compra').style.display='flex';
  setTimeout(()=>document.getElementById('compra-valor').focus(),100);
}

function confirmarCompra(){
  const valor=parseFloat(document.getElementById('compra-valor').value);
  if(!valor||valor<=0){alert('Informe o valor total pago.');return;}
  const loja=document.getElementById('compra-loja').value.trim();
  const item=itens.find(i=>i.id===compraItemId);
  item.comprado=true;item.gasto=valor;item.loja=loja;
  closeModals();saveData();renderAll();showToast(`"${item.nome}" registrado por ${fmt(valor)}`);
}

function openAddModal(){
  ['add-nome','add-obs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('add-qtd').value='1';
  document.getElementById('add-min').value='';document.getElementById('add-max').value='';
  document.getElementById('modal-add').style.display='flex';
  setTimeout(()=>document.getElementById('add-nome').focus(),100);
}

function addItem(){
  const nome=document.getElementById('add-nome').value.trim();
  if(!nome){alert('Nome do item é obrigatório.');return;}
  itens.push({id:nextId++,amb:document.getElementById('add-amb').value,nome,cat:document.getElementById('add-cat').value,pri:document.getElementById('add-pri').value,obs:document.getElementById('add-obs').value.trim(),qtd:Math.max(1,parseInt(document.getElementById('add-qtd').value)||1),min:parseFloat(document.getElementById('add-min').value)||0,max:parseFloat(document.getElementById('add-max').value)||0,comprado:false,gasto:0,loja:''});
  closeModals();saveData();renderAll();showToast(`"${nome}" adicionado`);
}

function confirmRemove(id){
  const item=itens.find(i=>i.id===id);if(!item)return;
  document.getElementById('confirm-msg').textContent=`Remover "${item.nome}" da lista? Esta ação não pode ser desfeita.`;
  document.getElementById('confirm-ok').onclick=()=>{itens=itens.filter(i=>i.id!==id);closeModals();saveData();renderAll();showToast('Item removido');};
  document.getElementById('modal-confirm').style.display='flex';
}

function closeModals(){['modal-add','modal-compra','modal-confirm'].forEach(id=>document.getElementById(id).style.display='none');}
function overlayClick(e,id){if(e.target.id===id)closeModals();}

function showToast(msg){
  clearTimeout(toastTimer);document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);toastTimer=setTimeout(()=>t.remove(),3000);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModals();});
window.addEventListener('storage',e=>{if(e.key===STORAGE_KEY&&e.newValue){try{const p=JSON.parse(e.newValue);itens=p.itens||itens;nextId=p.nextId||nextId;renderAll();showToast('Lista atualizada');}catch(err){}}});
loadData();
</script>
</body>
</html>
