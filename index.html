<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossa Mudança – Felipe & Família</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F6F2;--card:#FFFFFF;--card2:#F2EFE9;
  --text:#1A1814;--text2:#6B6760;--text3:#9E9B96;
  --accent:#2D5A3D;--accent2:#4A8C60;--accent-bg:#EAF3DE;
  --warn:#BA7517;--warn-bg:#FAEEDA;
  --danger:#A32D2D;--danger-bg:#FCEBEB;
  --info:#185FA5;--info-bg:#E6F1FB;
  --border:#E5E2DC;--border2:#D0CCC4;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
h1,h2,h3{font-family:'DM Serif Display',serif;font-weight:400}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px}
.nav-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-brand h1{font-size:18px;color:var(--accent)}
.nav-brand span{font-size:12px;color:var(--text3);font-family:'DM Sans',sans-serif}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:6px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .15s;font-family:'DM Sans',sans-serif}
.nav-tab.active{background:var(--accent);color:#fff}
.nav-tab:hover:not(.active){background:var(--card2)}
.sync-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--accent-bg);color:var(--accent);font-weight:500;white-space:nowrap;flex-shrink:0}
main{max-width:1100px;margin:0 auto;padding:24px 20px}
.section-title{font-size:24px;color:var(--text);margin-bottom:4px}
.section-sub{font-size:14px;color:var(--text2);margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.metric{background:var(--card2);border-radius:var(--radius-sm);padding:14px 16px}
.metric-label{font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.metric-value{font-size:26px;font-family:'DM Serif Display',serif;color:var(--text)}
.metric-sub{font-size:12px;color:var(--text2);margin-top:2px}
.metric.green .metric-value{color:var(--accent)}
.metric.amber .metric-value{color:var(--warn)}
.metric.red .metric-value{color:var(--danger)}
.metric.blue .metric-value{color:var(--info)}
.prog-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:4px 0}
.prog-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s ease}
.prog-fill.amber{background:var(--warn)}
.prog-fill.red{background:var(--danger)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.tag-essencial{background:var(--accent-bg);color:var(--accent)}
.tag-nao{background:var(--warn-bg);color:var(--warn)}
.tag-alta{background:var(--danger-bg);color:var(--danger)}
.tag-media{background:var(--warn-bg);color:var(--warn)}
.tag-baixa{background:var(--info-bg);color:var(--info)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-size:13px;cursor:pointer;color:var(--text2);font-family:'DM Sans',sans-serif;transition:all .15s}
.filter-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.search-input{flex:1;min-width:180px;padding:7px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--card);color:var(--text);outline:none}
.search-input:focus{border-color:var(--accent)}
.item-list{display:flex;flex-direction:column;gap:6px}
.item-row{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;display:grid;grid-template-columns:32px 1fr auto;gap:12px;align-items:center;transition:all .15s}
.item-row:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.item-row.comprado{opacity:.7;background:var(--card2)}
.item-row.comprado .item-name{text-decoration:line-through;color:var(--text2)}
.item-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;background:transparent}
.item-check.checked{background:var(--accent);border-color:var(--accent)}
.item-check svg{display:none}
.item-check.checked svg{display:block}
.item-info{min-width:0}
.item-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap}
.item-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.item-price{font-size:13px;color:var(--text2);text-align:right;white-space:nowrap}
.item-price strong{display:block;font-size:14px;color:var(--text);font-weight:600}
.item-qty{font-size:11px;color:var(--text3)}
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid transparent}
.btn-danger:hover{background:#F7C1C1}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--card2)}
.btn-sm{padding:5px 10px;font-size:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:var(--radius);padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto}
.modal h2{font-size:20px;margin-bottom:20px;color:var(--text)}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--card);color:var(--text);outline:none;transition:border .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:72px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:24px}
.compra-info{background:var(--card2);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px}
.compra-info p{font-size:13px;color:var(--text2);margin-bottom:4px}
.compra-info strong{font-size:15px;color:var(--text)}
.amb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.amb-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.amb-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.amb-name{font-size:16px;font-weight:600;color:var(--text)}
.amb-count{font-size:12px;color:var(--text3)}
.amb-values{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.amb-val{font-size:12px;color:var(--text2)}
.amb-val strong{display:block;font-size:15px;font-weight:600;color:var(--text)}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.chart-bar-label{font-size:12px;color:var(--text2);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar-wrap{flex:1;height:16px;background:var(--border);border-radius:4px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.chart-bar-val{font-size:12px;color:var(--text2);min-width:70px;text-align:right}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty h3{font-size:18px;font-family:'DM Serif Display',serif;margin-bottom:8px;color:var(--text2)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;z-index:999;animation:slideIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.2)}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.confirm-dialog{background:var(--card);border-radius:var(--radius);padding:24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.confirm-dialog h3{font-size:18px;margin-bottom:8px}
.confirm-dialog p{font-size:14px;color:var(--text2);margin-bottom:20px}
@media(max-width:640px){
  nav{padding:0 12px;height:52px}
  .nav-brand span{display:none}
  .nav-tabs{gap:2px}
  .nav-tab{padding:5px 9px;font-size:12px}
  main{padding:14px 12px}
  .item-row{grid-template-columns:26px 1fr auto}
  .form-row{grid-template-columns:1fr}
  .metrics{grid-template-columns:1fr 1fr}
  .dash-grid{grid-template-columns:1fr}
  .modal{padding:20px}
  .section-title{font-size:20px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="8" fill="#2D5A3D"/>
      <path d="M8 20L14 8L20 20M10.5 16H17.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <div>
      <h1>Nossa Mudança</h1>
      <span>Felipe &amp; Família</span>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="setTab('lista')">Lista</button>
    <button class="nav-tab" onclick="setTab('resumo')">Ambientes</button>
    <button class="nav-tab" onclick="setTab('dash')">Dashboard</button>
  </div>
  <span class="sync-badge" id="sync-badge">● ao vivo</span>
</nav>

<main>
  <div id="tab-lista">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <h2 class="section-title">Lista de compras</h2>
        <p class="section-sub" id="lista-sub">Carregando...</p>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1V13M1 7H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Adicionar item
      </button>
    </div>
    <div class="metrics" id="metrics-lista"></div>
    <div class="filters">
      <input class="search-input" id="search" placeholder="Buscar item ou ambiente..." oninput="renderLista()">
      <button class="filter-btn active" onclick="setFilter(this,'todos')">Todos</button>
      <button class="filter-btn" onclick="setFilter(this,'Essencial')">Essencial</button>
      <button class="filter-btn" onclick="setFilter(this,'Não Essencial')">Não essencial</button>
      <button class="filter-btn" onclick="setFilter(this,'Alta')">Prioridade alta</button>
      <button class="filter-btn" onclick="setFilter(this,'pendente')">Pendentes</button>
      <button class="filter-btn" onclick="setFilter(this,'comprado')">Comprados</button>
    </div>
    <div id="lista-items" class="item-list"></div>
  </div>

  <div id="tab-resumo" style="display:none">
    <h2 class="section-title">Por ambiente</h2>
    <p class="section-sub">Itens e custos agrupados por cômodo</p>
    <div id="amb-cards" class="amb-grid"></div>
    <h2 class="section-title" style="margin-top:32px">Por prioridade</h2>
    <p class="section-sub">Itens agrupados por urgência de compra</p>
    <div id="pri-cards" class="amb-grid"></div>
  </div>

  <div id="tab-dash" style="display:none">
    <h2 class="section-title">Dashboard</h2>
    <p class="section-sub">Acompanhamento do planejamento da mudança</p>
    <div id="dash-content"></div>
  </div>
</main>

<!-- MODAL ADICIONAR -->
<div id="modal-add" class="modal-overlay" style="display:none" onclick="overlayClick(event,'modal-add')">
  <div class="modal">
    <h2>Adicionar item</h2>
    <div class="form-group">
      <label class="form-label">Nome do item *</label>
      <input class="form-input" id="add-nome" placeholder="ex: Sofá 3 lugares">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Ambiente *</label>
        <select class="form-select" id="add-amb">
          <option>Sala</option><option>Cozinha</option><option>Quarto Casal</option>
          <option>Escritório</option><option>Área de Serviço</option>
          <option>Banheiro / Lavabo</option><option>Geral / Tecnologia</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Categoria *</label>
        <select class="form-select" id="add-cat">
          <option>Essencial</option><option>Não Essencial</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prioridade *</label>
        <select class="form-select" id="add-pri">
          <option>Alta</option><option>Média</option><option>Baixa</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Quantidade</label>
        <input class="form-input" id="add-qtd" type="number" min="1" value="1">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Preço mínimo (R$)</label>
        <input class="form-input" id="add-min" type="number" min="0" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Preço máximo (R$)</label>
        <input class="form-input" id="add-max" type="number" min="0" placeholder="0">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Observação</label>
      <textarea class="form-textarea" id="add-obs" placeholder="Dicas de tamanho, marca, modelo..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
      <button class="btn btn-primary" onclick="addItem()">Adicionar</button>
    </div>
  </div>
</div>

<!-- MODAL COMPRA -->
<div id="modal-compra" class="modal-overlay" style="display:none" onclick="overlayClick(event,'modal-compra')">
  <div class="modal">
    <h2>Registrar compra</h2>
    <div class="compra-info" id="compra-info"></div>
    <div class="form-group">
      <label class="form-label">Valor total pago (R$) *</label>
      <input class="form-input" id="compra-valor" type="number" min="0" step="0.01" placeholder="0,00">
    </div>
    <div class="form-group">
      <label class="form-label">Onde comprou</label>
      <input class="form-input" id="compra-loja" placeholder="ex: Magazine Luiza, Tok&Stok...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarCompra()">Confirmar compra</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRM -->
<div id="modal-confirm" class="modal-overlay" style="display:none">
  <div class="confirm-dialog">
    <h3 id="confirm-title">Confirmar</h3>
    <p id="confirm-msg"></p>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
      <button class="btn btn-danger" id="confirm-ok">Remover</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'mudanca_felipe_v2';
const INITIAL_DATA = [
  {id:1,amb:'Sala',nome:'Sofá',cat:'Essencial',pri:'Alta',obs:'2 ou 3 lugares. Para sala de ~18 m² prefira sofá de até 2,20 m de largura.',qtd:1,min:1200,max:4000,comprado:false,gasto:0,loja:''},
  {id:2,amb:'Sala',nome:'Mesa de centro / mesinha lateral',cat:'Não Essencial',pri:'Média',obs:'Complementa o sofá; prefira modelos com tampo de vidro ou baixos.',qtd:1,min:200,max:800,comprado:false,gasto:0,loja:''},
  {id:3,amb:'Sala',nome:'Rack / painel para TV',cat:'Essencial',pri:'Alta',obs:'Painéis de 1,60–2,00 m são adequados para a sala.',qtd:1,min:400,max:2000,comprado:false,gasto:0,loja:''},
  {id:4,amb:'Sala',nome:'TV',cat:'Essencial',pri:'Alta',obs:'Para sala ~18 m², TV de 50"-55" é confortável.',qtd:1,min:1500,max:4500,comprado:false,gasto:0,loja:''},
  {id:5,amb:'Sala',nome:'Luminária de pé / pendente',cat:'Não Essencial',pri:'Baixa',obs:'Iluminação de ambiente; complementar às luminárias embutidas.',qtd:1,min:150,max:600,comprado:false,gasto:0,loja:''},
  {id:6,amb:'Sala',nome:'Tapete',cat:'Não Essencial',pri:'Baixa',obs:'Define a área de estar. Prefira 1,60×2,30 m para sofá de 3 lugares.',qtd:1,min:200,max:1200,comprado:false,gasto:0,loja:''},
  {id:7,amb:'Sala',nome:'Aparador / buffet',cat:'Não Essencial',pri:'Baixa',obs:'Armazenamento extra na sala.',qtd:1,min:400,max:1800,comprado:false,gasto:0,loja:''},
  {id:8,amb:'Cozinha',nome:'Geladeira',cat:'Essencial',pri:'Alta',obs:'Prefira modelos de 260–330 L, largura máx 60 cm. Evite side-by-side ou acima de 400 L.',qtd:1,min:1800,max:3500,comprado:false,gasto:0,loja:''},
  {id:9,amb:'Cozinha',nome:'Fogão',cat:'Essencial',pri:'Alta',obs:'Fogão 4 bocas (55 cm larg.) com forno integrado. Verifique: gás ou elétrico.',qtd:1,min:600,max:2000,comprado:false,gasto:0,loja:''},
  {id:10,amb:'Cozinha',nome:'Micro-ondas',cat:'Essencial',pri:'Alta',obs:'20–32 L suficiente para casal. Verifique nicho ou espaço no balcão.',qtd:1,min:350,max:1000,comprado:false,gasto:0,loja:''},
  {id:11,amb:'Cozinha',nome:'Depurador / Coifa',cat:'Essencial',pri:'Alta',obs:'Depurador recirculante dispensa duto; coifa exige instalação de duto.',qtd:1,min:400,max:1800,comprado:false,gasto:0,loja:''},
  {id:12,amb:'Cozinha',nome:'Lava-louças',cat:'Não Essencial',pri:'Baixa',obs:'Modelos compactos 6 serviços cabem em bancadas menores. Avalie ponto de água.',qtd:1,min:1200,max:3000,comprado:false,gasto:0,loja:''},
  {id:13,amb:'Cozinha',nome:'Mesa de jantar',cat:'Essencial',pri:'Alta',obs:'4 lugares aprox. 1,20×0,80 m. Extensível é ótima opção.',qtd:1,min:600,max:2500,comprado:false,gasto:0,loja:''},
  {id:14,amb:'Cozinha',nome:'Cadeiras',cat:'Essencial',pri:'Alta',obs:'4 cadeiras para a mesa de jantar.',qtd:4,min:150,max:500,comprado:false,gasto:0,loja:''},
  {id:15,amb:'Cozinha',nome:'Banquetas para bancada',cat:'Não Essencial',pri:'Baixa',obs:'2 banquetas se houver bancada/ilha para sentar.',qtd:2,min:120,max:400,comprado:false,gasto:0,loja:''},
  {id:16,amb:'Cozinha',nome:'Lixeira com pedal',cat:'Essencial',pri:'Média',obs:'12–15 L para uso diário na cozinha.',qtd:1,min:60,max:200,comprado:false,gasto:0,loja:''},
  {id:17,amb:'Quarto Casal',nome:'Cama box casal/queen',cat:'Essencial',pri:'Alta',obs:'Queen (1,58×1,98 m) ideal para quartos de 10–12 m². Verifique espaço lateral.',qtd:1,min:800,max:3500,comprado:false,gasto:0,loja:''},
  {id:18,amb:'Quarto Casal',nome:'Colchão',cat:'Essencial',pri:'Alta',obs:'D33–D45, Queen 1,58×1,98 m. Invista em boa qualidade para o sono.',qtd:1,min:800,max:3000,comprado:false,gasto:0,loja:''},

let itens = [];
let filtroAtivo = 'todos';
let tabAtiva = 'lista';
let compraItemId = null;
let nextId = 200;
let toastTimer;

function fmt(n){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);}

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const p = JSON.parse(raw);
      itens = p.itens||INITIAL_DATA;
      nextId = p.nextId||(Math.max(...itens.map(i=>i.id))+1);
    } else {
      itens = JSON.parse(JSON.stringify(INITIAL_DATA));
      saveData();
    }
  } catch(e){ itens = JSON.parse(JSON.stringify(INITIAL_DATA)); }
  renderAll();
}

function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({itens,nextId}));
    const b = document.getElementById('sync-badge');
    b.textContent = '✓ salvo';
    setTimeout(()=>b.textContent='● ao vivo',1500);
  } catch(e){}
}

function setTab(t){
  tabAtiva = t;
  ['lista','resumo','dash'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=(id===t)?'block':'none';
  });
  document.querySelectorAll('.nav-tab').forEach((btn,i)=>{
    btn.classList.toggle('active',['lista','resumo','dash'][i]===t);
  });
  renderAll();
}

function setFilter(el,f){
  filtroAtivo=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderLista();
}

function getFiltered(){
  const q=(document.getElementById('search')?.value||'').toLowerCase().trim();
  return itens.filter(i=>{
    const ms=!q||i.nome.toLowerCase().includes(q)||i.amb.toLowerCase().includes(q)||i.obs.toLowerCase().includes(q);
    const mf=filtroAtivo==='todos'||
      (filtroAtivo==='Essencial'&&i.cat==='Essencial')||
      (filtroAtivo==='Não Essencial'&&i.cat==='Não Essencial')||
      (filtroAtivo==='Alta'&&i.pri==='Alta')||
      (filtroAtivo==='pendente'&&!i.comprado)||
      (filtroAtivo==='comprado'&&i.comprado);
    return ms&&mf;
  });
}

function renderMetricsLista(){
  const total=itens.length,comp=itens.filter(i=>i.comprado).length;
  const tMin=itens.reduce((s,i)=>s+i.min*i.qtd,0);
  const tMax=itens.reduce((s,i)=>s+i.max*i.qtd,0);
  const gasto=itens.filter(i=>i.comprado).reduce((s,i)=>s+(i.gasto||0),0);
  const pct=total>0?Math.round(comp/total*100):0;
  document.getElementById('metrics-lista').innerHTML=`
    <div class="metric"><div class="metric-label">Total de itens</div><div class="metric-value">${total}</div><div class="metric-sub">${itens.filter(i=>i.cat==='Essencial').length} essenciais</div></div>
    <div class="metric green"><div class="metric-label">Progresso</div><div class="metric-value">${pct}%</div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>
    <div class="metric amber"><div class="metric-label">Orçamento estimado</div><div class="metric-value">${fmt(tMin)}</div><div class="metric-sub">até ${fmt(tMax)}</div></div>
    <div class="metric blue"><div class="metric-label">Já gasto</div><div class="metric-value">${fmt(gasto)}</div><div class="metric-sub">${fmt(Math.max(0,tMin-gasto))} restante</div></div>`;
  document.getElementById('lista-sub').textContent=`${total-comp} item${total-comp!==1?'s':''} pendente${total-comp!==1?'s':''}`;
}

function renderLista(){
  renderMetricsLista();
  const filtered=getFiltered();
  const container=document.getElementById('lista-items');
  if(!filtered.length){container.innerHTML='<div class="empty"><h3>Nenhum item encontrado</h3><p>Tente outro filtro ou busca</p></div>';return;}
  container.innerHTML=filtered.map(i=>`
    <div class="item-row ${i.comprado?'comprado':''}" id="row-${i.id}">
      <div class="item-check ${i.comprado?'checked':''}" onclick="toggleCompra(${i.id})">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="item-info">
        <div class="item-name">${i.nome}</div>
        <div class="item-meta">
          <span style="font-size:12px;color:var(--text3)">${i.amb}</span>
          <span class="tag ${i.cat==='Essencial'?'tag-essencial':'tag-nao'}">${i.cat}</span>
          <span class="tag tag-${i.pri.toLowerCase()}">${i.pri}</span>
          ${i.comprado&&i.loja?`<span style="font-size:11px;color:var(--text3);font-style:italic">${i.loja}</span>`:''}
        </div>
        ${i.obs?`<div style="font-size:11px;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:420px">${i.obs}</div>`:''}
      </div>
      <div class="item-actions">
        <div class="item-price">
          ${i.comprado&&i.gasto?`<strong style="color:var(--accent)">${fmt(i.gasto)}</strong><div class="item-qty">pago</div>`:
          `<strong>${fmt(i.min*i.qtd)}</strong><div class="item-qty">até ${fmt(i.max*i.qtd)} · ${i.qtd}un</div>`}
        </div>
        ${!i.comprado?`<button class="btn btn-primary btn-sm" onclick="openCompraModal(${i.id})">Comprei</button>`:''}
        <button class="btn btn-danger btn-sm" onclick="confirmRemove(${i.id})" title="Remover item">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function renderResumo(){
  const ambs=[...new Set(itens.map(i=>i.amb))];
  const aC={'Sala':'#2D5A3D','Cozinha':'#BA7517','Quarto Casal':'#185FA5','Escritório':'#7F77DD','Área de Serviço':'#0F6E56','Banheiro / Lavabo':'#993556','Geral / Tecnologia':'#5F5E5A'};
  document.getElementById('amb-cards').innerHTML=ambs.map(amb=>{
    const its=itens.filter(i=>i.amb===amb),comp=its.filter(i=>i.comprado).length;

    const gasto=its.filter(i=>i.comprado).reduce((s,i)=>s+(i.gasto||0),0);
    const pct=its.length?Math.round(comp/its.length*100):0,cor=aC[amb]||'#888';
    return`<div class="amb-card">
      <div class="amb-header"><div><span style="width:10px;height:10px;border-radius:50%;background:${cor};display:inline-block;margin-right:8px"></span><span class="amb-name">${amb}</span></div><span class="amb-count">${its.length} itens</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${cor}"></div></div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px">${comp}/${its.length} comprados (${pct}%)</div>
      <div style="display:flex;flex-direction:column;gap:4px">${its.slice(0,5).map(i=>`<div style="display:flex;align-items:center;gap:8px;font-size:13px"><span style="width:8px;height:8px;border-radius:50%;background:${i.comprado?cor:'var(--border2)'};flex-shrink:0"></span><span style="${i.comprado?'text-decoration:line-through;color:var(--text3)':'color:var(--text)'}">${i.nome}</span></div>`).join('')}${its.length>5?`<div style="font-size:12px;color:var(--text3);margin-top:4px">+${its.length-5} mais itens</div>`:''}</div>
      <div class="amb-values"><div class="amb-val"><span>Orçamento mín.</span><strong>${fmt(mn)}</strong></div><div class="amb-val"><span>Orçamento máx.</span><strong>${fmt(mx)}</strong></div>${gasto>0?`<div class="amb-val" style="grid-column:1/-1"><span>Já gasto</span><strong style="color:var(--accent)">${fmt(gasto)}</strong></div>`:''}</div>
    </div>`;
  }).join('');
  const pris=['Alta','Média','Baixa'],pC={'Alta':'#A32D2D','Média':'#BA7517','Baixa':'#185FA5'},pL={'Alta':'Comprar primeiro','Média':'Importante','Baixa':'Quando possível'};
  document.getElementById('pri-cards').innerHTML=pris.map(pri=>{
    const its=itens.filter(i=>i.pri===pri),comp=its.filter(i=>i.comprado).length;
    const mn=its.reduce((s,i)=>s+i.min*i.qtd,0),pct=its.length?Math.round(comp/its.length*100):0,cor=pC[pri];
    const pend=its.filter(i=>!i.comprado);
    return`<div class="amb-card">
      <div class="amb-header"><div><span class="tag tag-${pri.toLowerCase()}" style="margin-right:8px">${pri}</span><span style="font-size:13px;color:var(--text2)">${pL[pri]}</span></div><span class="amb-count">${its.length} itens</span></div>
      <div class="prog-bar"><div class="prog-fill ${pri==='Alta'?'red':pri==='Média'?'amber':''}" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">${comp}/${its.length} comprados</div>
      <div style="font-size:13px;color:var(--text2)">Orçamento mín: <strong style="color:var(--text)">${fmt(mn)}</strong></div>
      <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:4px">${pend.slice(0,6).map(i=>`<span style="font-size:11px;background:var(--card2);border:1px solid var(--border);padding:3px 8px;border-radius:20px;color:var(--text2)">${i.nome}</span>`).join('')}${pend.length>6?`<span style="font-size:11px;color:var(--text3)">+${pend.length-6} mais</span>`:''}</div>
    </div>`;
  }).join('');
}

function renderDash(){
  const total=itens.length,comp=itens.filter(i=>i.comprado).length,pend=total-comp;
  const tMin=itens.reduce((s,i)=>s+i.min*i.qtd,0),tMax=itens.reduce((s,i)=>s+i.max*i.qtd,0);
  const gasto=itens.filter(i=>i.comprado).reduce((s,i)=>s+(i.gasto||0),0);
  const pct=total?Math.round(comp/total*100):0,altaP=itens.filter(i=>!i.comprado&&i.pri==='Alta').length;
  const ambs=[...new Set(itens.map(i=>i.amb))];
  const maxV=Math.max(...ambs.map(a=>itens.filter(i=>i.amb===a).reduce((s,i)=>s+i.min*i.qtd,0)));
  const bC={'Sala':'#2D5A3D','Cozinha':'#BA7517','Quarto Casal':'#185FA5','Escritório':'#7F77DD','Área de Serviço':'#0F6E56','Banheiro / Lavabo':'#993556','Geral / Tecnologia':'#5F5E5A'};
  const ultCompras=itens.filter(i=>i.comprado&&i.gasto>0).slice(-5).reverse();
  document.getElementById('dash-content').innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="metric-label">Total de itens</div><div class="metric-value">${total}</div></div>
      <div class="metric green"><div class="metric-label">Comprados</div><div class="metric-value">${comp}</div><div class="metric-sub">${pct}% concluído</div></div>
      <div class="metric amber"><div class="metric-label">Pendentes</div><div class="metric-value">${pend}</div><div class="metric-sub">${altaP} de alta prioridade</div></div>
      <div class="metric blue"><div class="metric-label">Já gasto</div><div class="metric-value">${fmt(gasto)}</div></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="font-size:16px;font-weight:600">Progresso geral da mudança</h3><span style="font-size:28px;font-family:'DM Serif Display',serif;color:var(--accent)">${pct}%</span></div>
      <div class="prog-bar" style="height:14px"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--text3)"><span>${comp} comprados</span><span>${pend} pendentes</span></div>
    </div>
    <div class="dash-grid">
      <div class="card">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:16px">Orçamento por ambiente (mínimo)</h3>
        ${ambs.map(amb=>{const v=itens.filter(i=>i.amb===amb).reduce((s,i)=>s+i.min*i.qtd,0);const w=maxV>0?Math.round(v/maxV*100):0;return`<div class="chart-bar-row"><div class="chart-bar-label">${amb.split('/')[0].trim()}</div><div class="chart-bar-wrap"><div class="chart-bar-fill" style="width:${w}%;background:${bC[amb]||'#888'}"></div></div><div class="chart-bar-val">${fmt(v)}</div></div>`;}).join('')}
      </div>
      <div class="card">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:16px">Resumo financeiro</h3>
        ${[['Orçamento mínimo',fmt(tMin),'var(--text)'],['Orçamento máximo',fmt(tMax),'var(--text2)'],['Já gasto',fmt(gasto),'var(--accent)'],['Restante (vs mínimo)',fmt(Math.max(0,tMin-gasto)),'var(--warn)'],['Progresso financeiro',Math.round(tMin>0?gasto/tMin*100:0)+'%','var(--info)']].map(([l,v,c])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--text2)">${l}</span><span style="font-size:15px;font-weight:600;color:${c}">${v}</span></div>`).join('')}
        <h3 style="font-size:14px;font-weight:600;margin:16px 0 10px">Últimas compras registradas</h3>
        ${ultCompras.length?ultCompras.map(i=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:500">${i.nome}</div>${i.loja?`<div style="font-size:11px;color:var(--text3)">${i.loja}</div>`:''}</div><span style="font-size:14px;font-weight:600;color:var(--accent)">${fmt(i.gasto)}</span></div>`).join(''):'<p style="font-size:13px;color:var(--text3);margin-top:8px">Nenhuma compra registrada ainda.</p>'}
      </div>
    </div>`;
}

function renderAll(){
  if(tabAtiva==='lista')renderLista();
  if(tabAtiva==='resumo')renderResumo();
  if(tabAtiva==='dash')renderDash();
}

function toggleCompra(id){
  const item=itens.find(i=>i.id===id);if(!item)return;
  if(!item.comprado){openCompraModal(id);}
  else{item.comprado=false;item.gasto=0;item.loja='';saveData();renderAll();showToast('Item desmarcado como pendente');}
}

function openCompraModal(id){
  compraItemId=id;
  const item=itens.find(i=>i.id===id);
  document.getElementById('compra-info').innerHTML=`<p>${item.amb}</p><strong>${item.nome}</strong><p style="margin-top:6px;font-size:13px">Estimativa: ${fmt(item.min*item.qtd)} a ${fmt(item.max*item.qtd)} (${item.qtd}un)</p>`;
  document.getElementById('compra-valor').value='';
  document.getElementById('compra-loja').value='';
  document.getElementById('modal-compra').style.display='flex';
  setTimeout(()=>document.getElementById('compra-valor').focus(),100);
}

function confirmarCompra(){
  const valor=parseFloat(document.getElementById('compra-valor').value);
  if(!valor||valor<=0){alert('Informe o valor total pago.');return;}
  const loja=document.getElementById('compra-loja').value.trim();
  const item=itens.find(i=>i.id===compraItemId);
  item.comprado=true;item.gasto=valor;item.loja=loja;
  closeModals();saveData();renderAll();
  showToast(`"${item.nome}" comprado por ${fmt(valor)}`);
}

function openAddModal(){
  ['add-nome','add-obs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('add-qtd').value='1';
  document.getElementById('add-min').value='';
  document.getElementById('add-max').value='';
  document.getElementById('modal-add').style.display='flex';
  setTimeout(()=>document.getElementById('add-nome').focus(),100);
}

function addItem(){
  const nome=document.getElementById('add-nome').value.trim();
  if(!nome){alert('Nome do item é obrigatório.');return;}
  const item={
    id:nextId++,
    amb:document.getElementById('add-amb').value,
    nome,cat:document.getElementById('add-cat').value,
    pri:document.getElementById('add-pri').value,
    obs:document.getElementById('add-obs').value.trim(),
    qtd:Math.max(1,parseInt(document.getElementById('add-qtd').value)||1),
    min:parseFloat(document.getElementById('add-min').value)||0,
    max:parseFloat(document.getElementById('add-max').value)||0,
    comprado:false,gasto:0,loja:''
  };
  itens.push(item);closeModals();saveData();renderAll();
  showToast(`"${nome}" adicionado à lista`);
}

function confirmRemove(id){
  const item=itens.find(i=>i.id===id);if(!item)return;
  document.getElementById('confirm-msg').textContent=`Remover "${item.nome}" da lista? Esta ação não pode ser desfeita.`;
  document.getElementById('confirm-ok').onclick=()=>{itens=itens.filter(i=>i.id!==id);closeModals();saveData();renderAll();showToast('Item removido da lista');};
  document.getElementById('modal-confirm').style.display='flex';
}

function closeModals(){
  ['modal-add','modal-compra','modal-confirm'].forEach(id=>document.getElementById(id).style.display='none');
}

function overlayClick(e,modalId){if(e.target.id===modalId)closeModals();}

function showToast(msg){
  clearTimeout(toastTimer);
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);toastTimer=setTimeout(()=>t.remove(),3000);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModals();});

// Sincronização entre abas do browser
window.addEventListener('storage',e=>{
  if(e.key===STORAGE_KEY&&e.newValue){
    try{const p=JSON.parse(e.newValue);itens=p.itens||itens;nextId=p.nextId||nextId;renderAll();showToast('Lista atualizada por outro dispositivo');}catch(err){}
  }
});

loadData();
</script>
</body>
</html>
